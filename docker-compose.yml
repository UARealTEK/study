version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: study-mysql
    restart: always

    environment:
      MYSQL_DATABASE: study_db
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: password

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build: .
    container_name: study-app

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/study_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password

      SPRING_FLYWAY_URL: jdbc:mysql://mysql:3306/study_db
      SPRING_FLYWAY_USER: user
      SPRING_FLYWAY_PASSWORD: password

volumes:
  mysql_data: